openapi: 3.0.0
info:
  title: Multi-RPC API
  version: 1.0.0
security:
  - AuthToken: []
tags:
  - name: OrderServiceProcedures
    description: Order management service.
  - name: ProductServiceProcedures
    description: Product catalog service.
  - name: UserServiceProcedures
    description: User management service.
paths:
  /OrderService/createOrder:
    post:
      requestBody:
        $ref: "#/components/requestBodies/OrderServiceCreateOrderInput"
      responses:
        "200":
          $ref: "#/components/responses/OrderServiceCreateOrderOutput"
      tags:
        - OrderServiceProcedures
  /OrderService/getOrdersByUser:
    post:
      requestBody:
        $ref: "#/components/requestBodies/OrderServiceGetOrdersByUserInput"
      responses:
        "200":
          $ref: "#/components/responses/OrderServiceGetOrdersByUserOutput"
      tags:
        - OrderServiceProcedures
  /ProductService/getProduct:
    post:
      requestBody:
        $ref: "#/components/requestBodies/ProductServiceGetProductInput"
      responses:
        "200":
          $ref: "#/components/responses/ProductServiceGetProductOutput"
      tags:
        - ProductServiceProcedures
  /ProductService/searchProducts:
    post:
      requestBody:
        $ref: "#/components/requestBodies/ProductServiceSearchProductsInput"
      responses:
        "200":
          $ref: "#/components/responses/ProductServiceSearchProductsOutput"
      tags:
        - ProductServiceProcedures
  /UserService/getUser:
    post:
      requestBody:
        $ref: "#/components/requestBodies/UserServiceGetUserInput"
      responses:
        "200":
          $ref: "#/components/responses/UserServiceGetUserOutput"
      tags:
        - UserServiceProcedures
  /UserService/listUsers:
    post:
      requestBody:
        $ref: "#/components/requestBodies/UserServiceListUsersInput"
      responses:
        "200":
          $ref: "#/components/responses/UserServiceListUsersOutput"
      tags:
        - UserServiceProcedures
components:
  securitySchemes:
    AuthToken:
      description: "Enter the full value for the Authorization header. The specific format (Bearer, Basic, API Key, etc.) is determined by the server's implementation.\n\n---\n**Examples:**\n- **Bearer Token:** `Bearer eyJhbGciOiJIUzI1Ni...` (a JWT token)\n- **Basic Auth:** `Basic dXNlcm5hbWU6cGFzc3dvcmQ=` (a base64 encoding of `username:password`)\n- **API Key:** `sk_live_123abc456def` (a raw token)"
      in: header
      name: Authorization
      type: apiKey
  schemas:
    Order:
      properties:
        id:
          type: string
        productIds:
          items:
            type: string
          type: array
        total:
          type: number
        userId:
          type: string
      required:
        - id
        - userId
        - productIds
        - total
      type: object
    Product:
      properties:
        id:
          type: string
        name:
          type: string
        price:
          type: number
      required:
        - id
        - name
        - price
      type: object
    User:
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
      type: object
  requestBodies:
    OrderServiceCreateOrderInput:
      content:
        application/json:
          schema:
            properties:
              productIds:
                items:
                  type: string
                type: array
              userId:
                type: string
            required:
              - userId
              - productIds
            type: object
      description: Request body for OrderService/createOrder procedure
    OrderServiceGetOrdersByUserInput:
      content:
        application/json:
          schema:
            properties:
              userId:
                type: string
            required:
              - userId
            type: object
      description: Request body for OrderService/getOrdersByUser procedure
    ProductServiceGetProductInput:
      content:
        application/json:
          schema:
            properties:
              id:
                type: string
            required:
              - id
            type: object
      description: Request body for ProductService/getProduct procedure
    ProductServiceSearchProductsInput:
      content:
        application/json:
          schema:
            properties:
              maxPrice:
                type: number
              query:
                type: string
            required:
              - query
            type: object
      description: Request body for ProductService/searchProducts procedure
    UserServiceGetUserInput:
      content:
        application/json:
          schema:
            properties:
              id:
                type: string
            required:
              - id
            type: object
      description: Request body for UserService/getUser procedure
    UserServiceListUsersInput:
      content:
        application/json:
          schema:
            properties:
              limit:
                type: integer
              offset:
                type: integer
            required:
              - limit
              - offset
            type: object
      description: Request body for UserService/listUsers procedure
  responses:
    OrderServiceCreateOrderOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  order:
                    $ref: "#/components/schemas/Order"
                required:
                  - order
                type: object
            required:
              - ok
            type: object
      description: Response for OrderService/createOrder procedure
    OrderServiceGetOrdersByUserOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  orders:
                    items:
                      $ref: "#/components/schemas/Order"
                    type: array
                required:
                  - orders
                type: object
            required:
              - ok
            type: object
      description: Response for OrderService/getOrdersByUser procedure
    ProductServiceGetProductOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  product:
                    $ref: "#/components/schemas/Product"
                required:
                  - product
                type: object
            required:
              - ok
            type: object
      description: Response for ProductService/getProduct procedure
    ProductServiceSearchProductsOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  products:
                    items:
                      $ref: "#/components/schemas/Product"
                    type: array
                required:
                  - products
                type: object
            required:
              - ok
            type: object
      description: Response for ProductService/searchProducts procedure
    UserServiceGetUserOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                required:
                  - user
                type: object
            required:
              - ok
            type: object
      description: Response for UserService/getUser procedure
    UserServiceListUsersOutput:
      content:
        application/json:
          schema:
            properties:
              error:
                properties:
                  category:
                    type: string
                  code:
                    type: string
                  details:
                    additionalProperties: true
                    properties: {}
                    type: object
                  message:
                    type: string
                required:
                  - message
                type: object
              ok:
                type: boolean
              output:
                properties:
                  total:
                    type: integer
                  users:
                    items:
                      $ref: "#/components/schemas/User"
                    type: array
                required:
                  - users
                  - total
                type: object
            required:
              - ok
            type: object
      description: Response for UserService/listUsers procedure
